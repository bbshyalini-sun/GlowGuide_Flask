<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skinalyze | Diagnostic</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: linear-gradient(135deg, #f5f7fa 0%, #e4ecf7 100%); min-height: 100vh; font-family: 'Segoe UI', sans-serif; }
        .card-assessment { border-radius: 20px; border: none; background: white; box-shadow: 0 10px 30px rgba(0,0,0,0.06); }
        .custom-select { border: 2px solid #e2e8f0; border-radius: 12px; padding: 12px 20px; font-size: 1.05rem; }
        .custom-select:focus { border-color: #4a5c4e; box-shadow: 0 0 0 4px rgba(74, 92, 78, 0.15); }
        .sidebar-menu { background: #1a1e29; width: 280px; border-right: 1px solid rgba(255,255,255,0.1); }
        .nav-link-custom:hover { background: rgba(255,255,255,0.08); color: #a78bfa !important; }
        .btn-submit { background-color: #4a5c4e; color: white; font-weight: bold; padding: 14px; border-radius: 30px; border: none; }
        .btn-submit:hover { background-color: #3b4a3e; color: white; }
    </style>
</head>
<body>

    <button class="btn btn-light position-fixed top-0 start-0 m-3 shadow rounded-circle d-flex align-items-center justify-content-center" 
            type="button" data-bs-toggle="offcanvas" data-bs-target="#skinalyzeDashboard" style="width: 50px; height: 50px; z-index: 1050;">
        <span style="font-size: 22px; color: #4a5c4e;">☰</span>
    </button>

    <div class="offcanvas offcanvas-start text-white sidebar-menu" tabindex="-1" id="skinalyzeDashboard">
        <div class="offcanvas-header border-bottom border-secondary py-4">
            <h5 class="offcanvas-title fw-bold text-success">✨ Skinalyze Dashboard</h5>
            <button type="button" class="btn-close btn-close-white" data-bs-dismiss="offcanvas"></button>
        </div>
        <div class="offcanvas-body d-flex flex-column justify-content-between px-3 py-4">
            <ul class="nav nav-pills flex-column mb-auto gap-2">
                <li class="nav-item">
                    <a href="/" class="nav-link text-white py-3 px-3 rounded-3 d-flex align-items-center gap-3 nav-link-custom">
                        <span>🏠</span> <span class="fw-medium">Homepage</span>
                    </a>
                </li>
                <li class="nav-item">
                    <a href="/info" class="nav-link text-white py-3 px-3 rounded-3 d-flex align-items-center gap-3 nav-link-custom">
                        <span>📖</span> <span class="fw-medium">Skincare Info Guide</span>
                    </a>
                </li>
                <li class="nav-item">
                    <a href="/history" class="nav-link text-white py-3 px-3 rounded-3 d-flex align-items-center gap-3 nav-link-custom">
                        <span>📜</span> <span class="fw-medium">Recent History</span>
                    </a>
                </li>
            </ul>
            <div class="p-3 bg-dark rounded-3 border border-secondary text-center">
                <small class="text-muted d-block mb-1">System Status</small>
                <span class="badge bg-success px-2 py-1 rounded-pill">Matrix Engine Ready</span>
            </div>
        </div>
    </div>

    <div class="container d-flex align-items-center justify-content-center" style="min-height: 100vh; padding-top: 60px;">
        <div class="card card-assessment p-4 p-md-5 w-100 shadow-lg" style="max-width: 650px;">
            <h2 class="fw-bold text-center mb-2" style="color: #4a5c4e;">Skin Profiler Matrix</h2>
            <p class="text-center text-muted mb-4">Select your operational properties below to parse our product configuration matrices.</p>
            
            <form action="/recommend" method="POST">
                {% if error %}
                <div class="alert alert-danger">{{ error }}</div>
                {% endif %}
                <div class="mb-3">
                    <label for="userName" class="fw-bold mb-2 text-secondary">Your Name:</label>
                    <input type="text" id="userName" name="user_name" class="form-control custom-select" placeholder="Enter name" value="{{ user_name or '' }}" required>
                </div>
                <div class="mb-4">
                    <label for="skinTypeSelect" class="fw-bold mb-2 text-secondary">1. Identify Primary Skin Type:</label>
                    <select class="form-select custom-select" id="skinTypeSelect" name="skin_type" required>
                        <option value="" disabled selected>Select your skin type...</option>
                        {% for st in skin_types %}
                            <option value="{{ st['skin_type_id'] }}">{{ st['skin_type_name'] }}</option>
                        {% endfor %}
                    </select>
                </div>

                <div class="mb-5">
                    <label for="concernSelect" class="fw-bold mb-2 text-secondary">2. Skin Concern:</label>
                    <select class="form-select custom-select" id="concernSelect" name="skin_issue" required>
                        <option value="" disabled selected>Select skin concern...</option>
                        {% for si in skin_issues %}
                            <option value="{{ si['issue_id'] }}">{{ si['issue_name'] }}</option>
                        {% endfor %}
                    </select>
                </div>

                <button type="submit" class="btn btn-submit btn-lg w-100 shadow-sm">Process Recommendation Architecture</button>
            </form>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
